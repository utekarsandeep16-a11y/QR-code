<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRForge — Dynamic QR Generator</title>
<style>
  /* ===== TOKENS ===== */
  :root {
    --bg: #fafaf7;
    --bg-2: #ffffff;
    --bg-3: #f3f3ee;
    --line: #e6e5df;
    --line-2: #d4d2c9;
    --ink: #14140f;
    --ink-2: #4a4a42;
    --ink-3: #88857a;
    --ink-4: #b5b3a8;
    --acc: #14140f;
    --acc-ink: #fafaf7;
    --brand: #5b6cff;
    --brand-2: #7c4dff;
    --brand-soft: #eef0ff;
    --green: #1f9d55;
    --green-soft: #e3f6ec;
    --red: #d64545;
    --red-soft: #fce8e8;
    --amber: #c47a14;
    --amber-soft: #fdf3e3;
    --shadow-sm: 0 1px 2px rgba(20,20,15,0.04);
    --shadow: 0 1px 3px rgba(20,20,15,0.05), 0 4px 16px rgba(20,20,15,0.04);
    --shadow-lg: 0 8px 24px rgba(20,20,15,0.08), 0 24px 64px rgba(20,20,15,0.08);
    --r-sm: 6px;
    --r: 10px;
    --r-lg: 16px;
    --r-xl: 24px;
    --t: 220ms cubic-bezier(0.32, 0.72, 0.24, 1);
    --t-fast: 140ms cubic-bezier(0.32, 0.72, 0.24, 1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0c0c0a;
      --bg-2: #16161310;
      --bg-3: #1c1c19;
      --line: #2a2a25;
      --line-2: #3a3a33;
      --ink: #f3f1e8;
      --ink-2: #c5c3b8;
      --ink-3: #87857a;
      --ink-4: #56554c;
      --acc: #f3f1e8;
      --acc-ink: #14140f;
      --brand-soft: rgba(91, 108, 255, 0.12);
      --green-soft: rgba(31, 157, 85, 0.12);
      --red-soft: rgba(214, 69, 69, 0.12);
      --amber-soft: rgba(196, 122, 20, 0.12);
      --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.4), 0 24px 64px rgba(0,0,0,0.3);
    }
    body { background: var(--bg); }
    .card { background: #16161310; }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14.5px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ===== APP SHELL ===== */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; }
  }

  /* ===== SIDEBAR ===== */
  .side {
    background: var(--bg-2);
    border-right: 1px solid var(--line);
    padding: 22px 16px;
    position: sticky; top: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  @media (max-width: 880px) {
    .side {
      position: static;
      height: auto;
      flex-direction: row;
      align-items: center;
      padding: 12px 16px;
      gap: 8px;
      overflow-x: auto;
    }
    .side::-webkit-scrollbar { display: none; }
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px;
    margin-bottom: 24px;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.01em;
  }
  @media (max-width: 880px) { .brand { margin-bottom: 0; flex-shrink: 0; } }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: var(--ink);
    color: var(--bg);
    display: grid; place-items: center;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .nav {
    display: flex; flex-direction: column; gap: 2px;
    flex: 1;
  }
  @media (max-width: 880px) { .nav { flex-direction: row; flex: none; } }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    color: var(--ink-2);
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    border: 0;
    background: transparent;
    width: 100%;
    text-align: left;
    transition: background var(--t-fast), color var(--t-fast);
    font-family: inherit;
    white-space: nowrap;
  }
  .nav-item:hover { background: var(--bg-3); color: var(--ink); }
  .nav-item.active { background: var(--ink); color: var(--bg); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-item .count {
    margin-left: auto;
    font-size: 11px;
    background: var(--bg-3);
    color: var(--ink-3);
    padding: 1px 7px;
    border-radius: 999px;
    font-weight: 600;
  }
  .nav-item.active .count { background: rgba(255,255,255,0.18); color: var(--bg); }
  .side-foot {
    margin-top: auto;
    padding: 12px;
    font-size: 11px;
    color: var(--ink-4);
    border-top: 1px solid var(--line);
  }
  @media (max-width: 880px) { .side-foot { display: none; } }

  /* ===== MAIN ===== */
  .main {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px;
    padding: 0 28px;
    background: var(--bg-2);
    position: sticky; top: 0; z-index: 5;
  }
  @media (max-width: 880px) { .topbar { padding: 0 16px; } }
  .topbar h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .topbar .pill {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    background: var(--brand-soft);
    color: var(--brand);
    font-size: 12px;
    font-weight: 600;
    border-radius: 999px;
  }
  .pill .dot {
    width: 6px; height: 6px;
    background: var(--brand);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ===== VIEW TRANSITIONS ===== */
  .view {
    padding: 28px;
    flex: 1;
    animation: viewIn var(--t) both;
  }
  @media (max-width: 880px) { .view { padding: 16px; } }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== CREATE: TYPE PICKER ===== */
  .types {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }
  .type {
    appearance: none; border: 1px solid var(--line);
    background: var(--bg-2);
    border-radius: var(--r);
    padding: 14px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink-2);
    transition: all var(--t-fast);
    position: relative;
  }
  .type:hover {
    border-color: var(--line-2);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .type.active {
    border-color: var(--ink);
    background: var(--ink);
    color: var(--bg);
  }
  .type svg { width: 22px; height: 22px; }
  .type-label { font-size: 12px; font-weight: 600; }

  /* ===== CREATE: GRID ===== */
  .grid {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) 380px;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 1080px) {
    .grid { grid-template-columns: 1fr; }
  }
  .card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 22px;
    box-shadow: var(--shadow-sm);
  }
  .card + .card { margin-top: 16px; }

  .card-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .card-head h2 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.005em;
  }
  .card-head .step {
    font-size: 11px;
    background: var(--bg-3);
    color: var(--ink-3);
    width: 22px; height: 22px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* ===== FORM ===== */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-2);
    margin-bottom: 6px;
  }
  .field-label .opt {
    color: var(--ink-4);
    font-weight: 400;
    font-size: 11px;
    margin-left: 4px;
  }
  .input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 10px 12px;
    border-radius: var(--r-sm);
    font-size: 14px;
    font-family: inherit;
    transition: border-color var(--t-fast), box-shadow var(--t-fast);
  }
  .input:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 3px var(--bg-3);
  }
  .textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
  .input.mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 13px; }
  .field-hint {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 6px;
    line-height: 1.45;
  }

  /* button styles */
  .btn {
    appearance: none; border: 0;
    cursor: pointer;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: var(--r-sm);
    display: inline-flex; align-items: center; gap: 8px;
    transition: all var(--t-fast);
    line-height: 1;
  }
  .btn svg { width: 14px; height: 14px; }
  .btn-primary {
    background: var(--ink);
    color: var(--bg);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: var(--bg-2);
    color: var(--ink-2);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { color: var(--ink); border-color: var(--line-2); background: var(--bg-3); }
  .btn-danger { color: var(--red); background: var(--bg-2); border: 1px solid var(--line); }
  .btn-danger:hover { background: var(--red-soft); border-color: var(--red); }
  .btn-block { width: 100%; justify-content: center; padding: 12px 16px; }
  .btn-sm { padding: 7px 12px; font-size: 12.5px; }

  /* ===== CUSTOMIZATION ===== */
  .swatches {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .swatch {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--line);
    cursor: pointer;
    transition: transform var(--t-fast), border-color var(--t-fast);
    position: relative;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch.active {
    border-color: var(--ink);
    transform: scale(1.08);
  }
  .swatch.active::after {
    content: ''; position: absolute; inset: 3px;
    border: 2px solid var(--bg-2);
    border-radius: 50%;
  }
  .swatch.custom {
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    position: relative;
  }
  .swatch.custom::before {
    content: '+';
    position: absolute; inset: 0;
    display: grid; place-items: center;
    color: white;
    font-size: 18px;
    font-weight: 600;
    text-shadow: 0 0 2px rgba(0,0,0,0.5);
  }
  .swatch.custom input {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
  }

  .style-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .style-tile {
    aspect-ratio: 1.4;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all var(--t-fast);
  }
  .style-tile:hover { border-color: var(--line-2); }
  .style-tile.active {
    border-color: var(--ink);
    background: var(--bg-3);
  }
  .style-tile svg { width: 36px; height: 36px; color: var(--ink); }

  .file-drop {
    border: 1.5px dashed var(--line-2);
    border-radius: var(--r-sm);
    padding: 14px;
    text-align: center;
    cursor: pointer;
    color: var(--ink-3);
    font-size: 12.5px;
    transition: all var(--t-fast);
    position: relative;
  }
  .file-drop:hover { border-color: var(--ink-3); color: var(--ink-2); background: var(--bg-3); }
  .file-drop.has-file { border-color: var(--ink); color: var(--ink); border-style: solid; background: var(--bg-3); }
  .file-drop input { display: none; }
  .file-drop .clear { color: var(--red); font-weight: 600; }

  /* ===== PREVIEW ===== */
  .preview-card {
    position: sticky;
    top: 76px;
    text-align: center;
  }
  .preview-stage {
    background: white;
    border-radius: var(--r-lg);
    padding: 24px;
    aspect-ratio: 1;
    display: grid; place-items: center;
    margin-bottom: 14px;
    position: relative;
    transition: background var(--t);
  }
  .preview-stage canvas {
    max-width: 100%; max-height: 100%;
    width: 100%; height: 100%;
    border-radius: 4px;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    transition: opacity var(--t);
  }
  .preview-empty {
    color: #999;
    font-size: 13px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .preview-empty svg { width: 56px; height: 56px; opacity: 0.5; }
  .encodes-line {
    font-family: ui-monospace, monospace;
    font-size: 11.5px;
    color: var(--ink-3);
    background: var(--bg-3);
    padding: 8px 12px;
    border-radius: var(--r-sm);
    word-break: break-all;
    margin-bottom: 12px;
    text-align: left;
  }
  .encodes-line strong { color: var(--ink-2); font-weight: 600; }
  .download-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* ===== MODE TOGGLE ===== */
  .mode-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    background: var(--bg-3);
    border-radius: var(--r);
    margin-bottom: 16px;
    font-size: 12.5px;
  }
  .mode-row .mode-label { color: var(--ink-3); font-weight: 500; }
  .mode-pill {
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 11.5px;
  }
  .mode-pill.static { background: var(--bg-2); color: var(--ink-2); border: 1px solid var(--line); }
  .mode-pill.dynamic { background: var(--green-soft); color: var(--green); }
  .mode-row .desc { color: var(--ink-3); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mode-row a { color: var(--brand); cursor: pointer; font-weight: 600; }
  .mode-row a:hover { text-decoration: underline; }

  /* ===== DASHBOARD ===== */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 16px;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 500;
  }

  .toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .toolbar .input { max-width: 280px; }
  .toolbar .filler { flex: 1; }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .qr-card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 16px;
    transition: all var(--t-fast);
    display: flex; flex-direction: column; gap: 12px;
    animation: cardIn var(--t) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .qr-card:hover {
    border-color: var(--line-2);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .qr-card-top {
    display: flex; align-items: flex-start; gap: 12px;
  }
  .qr-card-mini {
    width: 64px; height: 64px;
    background: white;
    border-radius: 8px;
    padding: 4px;
    flex-shrink: 0;
  }
  .qr-card-mini canvas { width: 100%; height: 100%; }
  .qr-card-info {
    flex: 1; min-width: 0;
  }
  .qr-card-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .qr-card-sub {
    font-size: 12px;
    color: var(--ink-3);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: ui-monospace, monospace;
  }
  .qr-card-meta {
    display: flex; gap: 12px;
    font-size: 11.5px;
    color: var(--ink-3);
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }
  .qr-card-meta strong { color: var(--ink); font-weight: 600; }
  .qr-card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 7px;
    border: 1px solid var(--line);
    background: var(--bg-2);
    cursor: pointer;
    color: var(--ink-2);
    display: grid; place-items: center;
    transition: all var(--t-fast);
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--line-2); background: var(--bg-3); }
  .icon-btn.danger:hover { color: var(--red); border-color: var(--red); background: var(--red-soft); }
  .icon-btn svg { width: 14px; height: 14px; }
  .badge-type {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px;
    background: var(--bg-3);
    color: var(--ink-3);
    font-size: 10.5px;
    font-weight: 600;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ===== EMPTY ===== */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-3);
  }
  .empty svg { width: 48px; height: 48px; margin: 0 auto 14px; opacity: 0.5; }
  .empty h3 { color: var(--ink); font-weight: 600; font-size: 17px; margin-bottom: 6px; letter-spacing: -0.01em; }
  .empty p { font-size: 13.5px; margin-bottom: 18px; }

  /* ===== MODAL ===== */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(20, 20, 15, 0.5);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: bgIn var(--t-fast);
  }
  @keyframes bgIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg-2);
    border-radius: var(--r-lg);
    width: 100%; max-width: 540px;
    max-height: 88vh;
    overflow: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn var(--t) both;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h3 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .modal-close {
    width: 28px; height: 28px;
    border: 0; background: transparent;
    color: var(--ink-3);
    cursor: pointer;
    border-radius: 6px;
    display: grid; place-items: center;
  }
  .modal-close:hover { background: var(--bg-3); color: var(--ink); }
  .modal-body { padding: 22px 24px; }
  .modal-foot {
    padding: 16px 24px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: flex-end; gap: 10px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--bg);
    padding: 11px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    z-index: 200;
    box-shadow: var(--shadow-lg);
    animation: toastIn var(--t);

  ::selection { background: var(--ink); color: var(--bg); }

<script>
(function () {
  /* ========= STATE ========= */
  const STORAGE_ITEMS = 'qrforge_items_v2';
  const STORAGE_SETTINGS = 'qrforge_settings_v2';
  const ALPHA = 'abcdefghijkmnpqrstuvwxyz23456789';

  let state = {
    view: 'create',
    items: [],
    settings: { prefix: '', adminToken: '' },
    draft: {
      type: 'url',
      label: '',
      // type-specific fields
      url: '',
      text: '',
      ssid: '', wifiPwd: '', wifiEnc: 'WPA',
      email: '', emailSubject: '', emailBody: '',
      phone: '',
      vcardName: '', vcardOrg: '', vcardPhone: '', vcardEmail: '', vcardUrl: '',
      // styling
      fg: '#14140f',
      bg: '#ffffff',
      style: 'square', // square | rounded | dot
      logo: null,
      // dynamic-mode editable destination (the current resolution target)
      destination: '',
    },
    editing: null,
  };

  /* ========= UTILS ========= */
  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
  const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);

  function loadAll() {
    try {
      const a = localStorage.getItem(STORAGE_ITEMS);
      const s = localStorage.getItem(STORAGE_SETTINGS);
      state.items = a ? JSON.parse(a) : [];
      if (s) state.settings = Object.assign({ prefix: '', adminToken: '' }, JSON.parse(s));
    } catch {}
  }
  function persistItems() {
    try { localStorage.setItem(STORAGE_ITEMS, JSON.stringify(state.items)); } catch {}
  }
  function persistSettings() {
    try { localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(state.settings)); } catch {}
  }
  function genSlug() {
    let s = '';
    for (let i = 0; i < 6; i++) s += ALPHA[Math.floor(Math.random() * ALPHA.length)];
    return s;
  }
  function uniqueSlug() {
    const used = new Set(state.items.map(i => i.slug));
    for (let i = 0; i < 30; i++) {
      const s = genSlug();
      if (!used.has(s)) return s;
    }
    return genSlug() + Math.random().toString(36).slice(2, 4);
  }
  function normalizeUrl(u) {
    const t = (u || '').trim();
    if (!t) return '';
    return /^https?:\/\//i.test(t) ? t : 'https://' + t;
  }
  function isDynamic() { return !!state.settings.prefix; }

  /* Build the actual encoded text for a QR depending on type */
  function buildPayload(item) {
    switch (item.type) {
      case 'url':
        return item.destination || item.url || '';
      case 'text':
        return item.text || '';
      case 'wifi':
        return `WIFI:T:${item.wifiEnc || 'WPA'};S:${(item.ssid || '').replace(/([\\;,:"])/g, '\\$1')};P:${(item.wifiPwd || '').replace(/([\\;,:"])/g, '\\$1')};;`;
      case 'email': {
        const params = [];
        if (item.emailSubject) params.push('subject=' + encodeURIComponent(item.emailSubject));
        if (item.emailBody) params.push('body=' + encodeURIComponent(item.emailBody));
        return `mailto:${item.email || ''}` + (params.length ? '?' + params.join('&') : '');
      }
      case 'phone':
        return `tel:${item.phone || ''}`;
      case 'vcard':
        return [
          'BEGIN:VCARD','VERSION:3.0',
          item.vcardName ? `FN:${item.vcardName}` : '',
          item.vcardOrg ? `ORG:${item.vcardOrg}` : '',
          item.vcardPhone ? `TEL:${item.vcardPhone}` : '',
          item.vcardEmail ? `EMAIL:${item.vcardEmail}` : '',
          item.vcardUrl ? `URL:${item.vcardUrl}` : '',
          'END:VCARD'
        ].filter(Boolean).join('\n');
      default:
        return '';
    }
  }

  /* What text actually gets encoded into the QR (handles dynamic redirect) */
  function qrText(item) {
    // Dynamic mode applies to URL types only
    if (item.type === 'url' && state.settings.prefix && item.slug) {
      return state.settings.prefix.replace(/\/+$/, '') + '/' + item.slug;
    }
    return buildPayload(item);
  }

  /* Has the draft got enough info to make a QR? */
  function isDraftReady(d) {
    switch (d.type) {
      case 'url': return !!normalizeUrl(d.url);
      case 'text': return !!(d.text && d.text.trim());
      case 'wifi': return !!(d.ssid && d.ssid.trim());
      case 'email': return !!(d.email && d.email.trim());
      case 'phone': return !!(d.phone && d.phone.trim());
      case 'vcard': return !!(d.vcardName && d.vcardName.trim());
    }
    return false;
  }

  /* ========= QR RENDERING ========= */
  function renderQRTo(canvas, text, opts) {
    opts = opts || {};
    return new Promise((resolve, reject) => {
      QRCode.toCanvas(canvas, text, {
        width: opts.width || 320,
        margin: 1,
        errorCorrectionLevel: opts.logo ? 'H' : 'M',
        color: { dark: opts.fg || '#000', light: opts.bg || '#fff' },
      }, (err) => err ? reject(err) : resolve());
    });
  }

  async function drawWithStyle(canvas, text, opts) {
    opts = opts || {};
    const fg = opts.fg || '#000', bg = opts.bg || '#fff';
    const size = opts.width || 320;
    const style = opts.style || 'square';

    // Always render base via library (square style)
    if (style === 'square') {
      await renderQRTo(canvas, text, opts);
    } else {
      // generate matrix and draw rounded/dot manually
      // Dot style needs higher error correction (more redundancy)
      const ec = (style === 'dot' || opts.logo) ? 'H' : 'Q';
      const qr = QRCode.create(text, { errorCorrectionLevel: ec });
      const moduleCount = qr.modules.size;
      const data = qr.modules.data;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, size, size);
      const margin = 1;
      const cell = size / (moduleCount + margin * 2);
      ctx.fillStyle = fg;

      // Finder pattern positions: top-left, top-right, bottom-left (each 7x7)
      const inFinder = (r, c) => {
        if (r < 7 && c < 7) return true; // top-left
        if (r < 7 && c >= moduleCount - 7) return true; // top-right
        if (r >= moduleCount - 7 && c < 7) return true; // bottom-left
        return false;
      };
      // Timing patterns: row 6 and column 6 (alternating between finders).
      // For dot style we keep them solid squares so scanners can lock alignment.
      const inTiming = (r, c) => (r === 6 || c === 6);

      // Draw finder patterns as rounded blocks first
      const drawRoundedRect = (x, y, w, h, rad) => {
        ctx.beginPath();
        const x2 = x + w, y2 = y + h;
        ctx.moveTo(x + rad, y);
        ctx.arcTo(x2, y, x2, y2, rad);
        ctx.arcTo(x2, y2, x, y2, rad);
        ctx.arcTo(x, y2, x, y, rad);
        ctx.arcTo(x, y, x2, y, rad);
        ctx.closePath();
        ctx.fill();
      };
      const finderCorners = [
        [0, 0], [0, moduleCount - 7], [moduleCount - 7, 0]
      ];
      const finderRad = style === 'dot' ? cell * 1.4 : cell * 1.2;
      for (const [fr, fc] of finderCorners) {
        const x = (fc + margin) * cell;
        const y = (fr + margin) * cell;
        const sz = 7 * cell;
        // outer
        ctx.fillStyle = fg;
        drawRoundedRect(x, y, sz, sz, finderRad);
        // inner white hole
        ctx.fillStyle = bg;
        drawRoundedRect(x + cell, y + cell, sz - 2 * cell, sz - 2 * cell, finderRad - cell * 0.6);
        // center dot
        ctx.fillStyle = fg;
        drawRoundedRect(x + cell * 2, y + cell * 2, sz - 4 * cell, sz - 4 * cell, finderRad - cell * 1.2);
      }

      // Draw remaining modules
      ctx.fillStyle = fg;
      for (let r = 0; r < moduleCount; r++) {
        for (let c = 0; c < moduleCount; c++) {
          if (!data[r * moduleCount + c]) continue;
          if (inFinder(r, c)) continue;
          const x = (c + margin) * cell;
          const y = (r + margin) * cell;
          const w = cell, h = cell;
          // Keep timing patterns solid to preserve scannability
          if (inTiming(r, c)) {
            ctx.fillRect(x, y, w, h);
            continue;
          }
          ctx.beginPath();
          if (style === 'dot') {
            ctx.arc(x + w/2, y + h/2, w/2 * 0.95, 0, Math.PI * 2);
            ctx.fill();
          } else if (style === 'rounded') {
            const rad = w * 0.3;
            const x2 = x + w, y2 = y + h;
            ctx.moveTo(x + rad, y);
            ctx.arcTo(x2, y, x2, y2, rad);
            ctx.arcTo(x2, y2, x, y2, rad);
            ctx.arcTo(x, y2, x, y, rad);
            ctx.arcTo(x, y, x2, y, rad);
            ctx.closePath();
            ctx.fill();
          }
        }
      }
    }

    if (opts.logo) {
      await drawLogo(canvas, opts.logo);
    }
  }

  async function drawLogo(canvas, logoDataUrl) {
    const img = new Image();
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = logoDataUrl; });
    const ctx = canvas.getContext('2d');
    const size = canvas.width * 0.22;
    const x = (canvas.width - size) / 2;
    const y = (canvas.height - size) / 2;
    const pad = size * 0.12;
    ctx.fillStyle = '#fff';
    const rad = 6;
    ctx.beginPath();
    const x0 = x - pad, y0 = y - pad, x1 = x + size + pad, y1 = y + size + pad;
    ctx.moveTo(x0 + rad, y0);
    ctx.arcTo(x1, y0, x1, y1, rad);
    ctx.arcTo(x1, y1, x0, y1, rad);
    ctx.arcTo(x0, y1, x0, y0, rad);
    ctx.arcTo(x0, y0, x1, y0, rad);
    ctx.closePath();
    ctx.fill();
    ctx.drawImage(img, x, y, size, size);
  }

    const old = $('.toast'); if (old) old.remove();

    const el = document.createElement('div');
    el.className = 'toast';
    const icon = kind === 'error'
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
    el.innerHTML = icon + '<span>' + esc(msg) + '</span>';
    document.body.appendChild(el);
    toastTimer = setTimeout(() => el.remove(), 2200);
  }

    form.addEventListener('input', (e) => {
      const id = e.target.id;
      if (!id || !id.startsWith('f_')) return;
      const key = id.slice(2);
      state.draft[key] = e.target.value;
      refreshPreview();
    });
    form.addEventListener('change', (e) => {
      const id = e.target.id;
      if (!id || !id.startsWith('f_')) return;
      const key = id.slice(2);
      state.draft[key] = e.target.value;
      refreshPreview();
    });

    // Color
    $$('[data-fg]').forEach(s => s.addEventListener('click', () => {
      state.draft.fg = s.dataset.fg;
      $$('[data-fg]').forEach(x => x.classList.toggle('active', x.dataset.fg === s.dataset.fg));
      refreshPreview();
    }));
    const fgCustom = $('#fgCustom');
    if (fgCustom) fgCustom.addEventListener('input', (e) => {
      state.draft.fg = e.target.value;
      $$('[data-fg]').forEach(x => x.classList.remove('active'));
      refreshPreview();
    });

    // Style
    $$('[data-style]').forEach(s => s.addEventListener('click', () => {
      state.draft.style = s.dataset.style;
      $$('[data-style]').forEach(x => x.classList.toggle('active', x.dataset.style === s.dataset.style));
      refreshPreview();
    }));

    // Logo
    const logoInput = $('#logoInput');
    if (logoInput) logoInput.addEventListener('change', (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      if (f.size > 800 * 1024) { toast('Logo too large (max 800KB)', 'error'); return; }
      const r = new FileReader();
      r.onload = () => { state.draft.logo = r.result; renderCreate(); };
      r.readAsDataURL(f);
    });
    const clear = $('#logoClear');
    if (clear) clear.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      state.draft.logo = null; renderCreate();
    });

    // Label
    const labelInput = $('#labelInput');
    if (labelInput) labelInput.addEventListener('input', (e) => state.draft.label = e.target.value);

    // Save
    $('#saveBtn').addEventListener('click', saveDraft);
    $('#dlPng').addEventListener('click', () => downloadPreview('png'));
    $('#dlSvg').addEventListener('click', () => downloadPreview('svg'));
  }

  async function refreshPreview() {
    const d = state.draft;
    const ready = isDraftReady(d);
    const empty = $('.preview-empty');
    const stage = $('#previewStage');
    if (!stage) return;
    stage.style.background = d.bg || '#fff';

    if (!ready) {
      stage.innerHTML = `<div class="preview-empty">${ICONS.qr}<span>Fill in content to see preview</span></div>`;
      $('#encodesText').textContent = '—';
      $('#dlPng').disabled = true; $('#dlSvg').disabled = true;
      return;
    }

    // Compute payload — for url type with dynamic mode, encode prefix/slug
    let encoded;
    if (d.type === 'url' && isDynamic()) {
      // For preview we use a placeholder slug
      encoded = state.settings.prefix.replace(/\/+$/, '') + '/<slug>';
    } else if (d.type === 'url') {
      encoded = normalizeUrl(d.url);
    } else {
      encoded = buildPayload({ ...d });
    }
    $('#encodesText').textContent = encoded.length > 80 ? encoded.slice(0, 77) + '…' : encoded;

    let canvas = $('#previewCanvas');
    if (!canvas) {
      stage.innerHTML = '<canvas id="previewCanvas"></canvas>';
      canvas = $('#previewCanvas');
    }

    // For preview render, use real text — generate a placeholder slug just for visual
    const previewText = (d.type === 'url' && isDynamic())
      ? state.settings.prefix.replace(/\/+$/, '') + '/preview'
      : encoded;

    try {
      await drawWithStyle(canvas, previewText, {
        width: 320,
        fg: d.fg, bg: d.bg, style: d.style, logo: d.logo,
      });
      $('#dlPng').disabled = false; $('#dlSvg').disabled = false;
    } catch (e) {
      console.warn('preview err', e);
    }
  }

  async function saveDraft() {
    const d = state.draft;
    if (!isDraftReady(d)) { toast('Fill in content first', 'error'); return; }

    const item = {
      id: 'qr_' + Math.random().toString(36).slice(2, 10),
      slug: uniqueSlug(),
      type: d.type,
      label: (d.label || '').trim() || defaultLabel(d),
      createdAt: Date.now(),
      scans: 0,
      // styling
      fg: d.fg, bg: d.bg, style: d.style, logo: d.logo,
      // type-specific
      url: d.type === 'url' ? normalizeUrl(d.url) : undefined,
      destination: d.type === 'url' ? normalizeUrl(d.url) : undefined,
      text: d.type === 'text' ? d.text : undefined,
      ssid: d.type === 'wifi' ? d.ssid : undefined,
      wifiPwd: d.type === 'wifi' ? d.wifiPwd : undefined,
      wifiEnc: d.type === 'wifi' ? d.wifiEnc : undefined,
      email: d.type === 'email' ? d.email : undefined,
      emailSubject: d.type === 'email' ? d.emailSubject : undefined,
      emailBody: d.type === 'email' ? d.emailBody : undefined,
      phone: d.type === 'phone' ? d.phone : undefined,
      vcardName: d.type === 'vcard' ? d.vcardName : undefined,
      vcardOrg: d.type === 'vcard' ? d.vcardOrg : undefined,
      vcardPhone: d.type === 'vcard' ? d.vcardPhone : undefined,
      vcardEmail: d.type === 'vcard' ? d.vcardEmail : undefined,
      vcardUrl: d.type === 'vcard' ? d.vcardUrl : undefined,
    };
    state.items.unshift(item);
    persistItems();
    // reset draft to defaults
    state.draft = {
      type: 'url', label: '',
      url: '', text: '', ssid: '', wifiPwd: '', wifiEnc: 'WPA',
      email: '', emailSubject: '', emailBody: '', phone: '',
      vcardName: '', vcardOrg: '', vcardPhone: '', vcardEmail: '', vcardUrl: '',
      fg: '#14140f', bg: '#ffffff', style: 'square', logo: null,
      destination: '',
    };
    toast('Saved to dashboard');
    setView('dashboard');
  }

  function defaultLabel(d) {
    switch (d.type) {
      case 'url': return d.url || 'Untitled URL';
      case 'text': return (d.text || '').slice(0, 40) || 'Untitled text';
      case 'wifi': return 'Wi-Fi: ' + (d.ssid || 'Network');
      case 'email': return 'Email: ' + (d.email || '');
      case 'phone': return 'Phone: ' + (d.phone || '');
      case 'vcard': return d.vcardName || 'Contact card';
    }
    return 'QR Code';
  }

  async function downloadPreview(fmt) {
    const d = state.draft;
    if (!isDraftReady(d)) return;
    const text = (d.type === 'url' && isDynamic())
      ? state.settings.prefix.replace(/\/+$/, '') + '/preview'
      : (d.type === 'url' ? normalizeUrl(d.url) : buildPayload(d));
    if (fmt === 'png') {
      const c = document.createElement('canvas');
      await drawWithStyle(c, text, { width: 1024, fg: d.fg, bg: d.bg, style: d.style, logo: d.logo });
      const a = document.createElement('a');
      a.href = c.toDataURL('image/png');
      a.download = 'qr-' + Date.now() + '.png';
      a.click();
      toast('Downloaded PNG');
    } else {
      QRCode.toString(text, { type: 'svg', margin: 1, color: { dark: d.fg, light: d.bg } }, (err, svg) => {
        if (err) { toast('SVG export failed', 'error'); return; }
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'qr-' + Date.now() + '.svg';
        a.click();
        toast('Downloaded SVG');
      });
    }
  }

  /* ----- DASHBOARD VIEW ----- */
  function renderDashboard() {
    const total = state.items.length;
    const totalScans = state.items.reduce((s, i) => s + (i.scans || 0), 0);
    const dynamicCount = state.items.filter(i => i.type === 'url').length;
    const recent = state.items.filter(i => Date.now() - i.createdAt < 7 * 86400000).length;

    if (!total) {
      viewport.innerHTML = `
        <div class="view">
          <div class="empty">
            ${ICONS.qr}
            <h3>No QR codes yet</h3>
            <p>Create your first QR code and it will appear here.</p>
            <button class="btn btn-primary" data-go="create">${ICONS.plus} <span>Create QR Code</span></button>
          </div>
        </div>
      `;
      $$('[data-go]').forEach(a => a.addEventListener('click', () => setView(a.dataset.go)));
      return;
    }

    viewport.innerHTML = `
      <div class="view">
        <div class="stats-row">
          <div class="stat">
            <div class="stat-num">${total}</div>
            <div class="stat-label">Total QR codes</div>
          </div>
          <div class="stat">
            <div class="stat-num">${totalScans}</div>
            <div class="stat-label">Total scans</div>
          </div>
          <div class="stat">
            <div class="stat-num">${dynamicCount}</div>
            <div class="stat-label">URL codes (editable)</div>
          </div>
          <div class="stat">
            <div class="stat-num">${recent}</div>
            <div class="stat-label">Created this week</div>
          </div>
        </div>

        <div class="toolbar">
          <input class="input" id="searchBox" placeholder="Search by label or content…" />
          <div class="filler"></div>
          <button class="btn btn-primary btn-sm" data-go="create">${ICONS.plus}<span>New QR</span></button>
        </div>

        <div class="qr-grid" id="qrGrid"></div>
      </div>
    `;
    $$('[data-go]').forEach(a => a.addEventListener('click', () => setView(a.dataset.go)));
    $('#searchBox').addEventListener('input', (e) => paintGrid(e.target.value));
    paintGrid('');
  }

  function paintGrid(filter) {
    const grid = $('#qrGrid');
    const f = filter.toLowerCase().trim();
    const items = state.items.filter(it => {
      if (!f) return true;
      const hay = [it.label, it.url, it.text, it.ssid, it.email, it.phone, it.vcardName].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(f);
    });
    grid.innerHTML = items.map(it => `
      <div class="qr-card" data-id="${it.id}">
        <div class="qr-card-top">
          <div class="qr-card-mini"><canvas data-mini="${it.id}"></canvas></div>
          <div class="qr-card-info">
            <span class="badge-type">${it.type}</span>
            <div class="qr-card-name" style="margin-top:6px;">${esc(it.label)}</div>
            <div class="qr-card-sub">${esc(qrSubLine(it))}</div>
          </div>
        </div>
        <div class="qr-card-meta">
          <span><strong>${it.scans || 0}</strong> scans</span>
          <span>•</span>
          <span>${new Date(it.createdAt).toLocaleDateString()}</span>
        </div>
        <div class="qr-card-actions">
          <button class="icon-btn" data-act="view" title="View QR">${ICONS.eye}</button>
          <button class="icon-btn" data-act="copy" title="Copy">${ICONS.copy}</button>
          <button class="icon-btn" data-act="edit" title="Edit">${ICONS.edit}</button>
          <button class="icon-btn" data-act="png" title="Download PNG">${ICONS.download}</button>
          <button class="icon-btn danger" data-act="del" title="Delete">${ICONS.trash}</button>
        </div>
      </div>
    `).join('');
    // mini QRs
    items.forEach(async (it) => {
      const c = grid.querySelector(`canvas[data-mini="${it.id}"]`);
      if (!c) return;
      try { await drawWithStyle(c, qrText(it), { width: 96, fg: it.fg || '#000', bg: it.bg || '#fff', style: it.style || 'square' }); } catch {}
    });
  }
  function qrSubLine(it) {
    if (it.type === 'url') return it.destination || it.url || '';
    if (it.type === 'wifi') return it.ssid || '';
    if (it.type === 'email') return it.email || '';
    if (it.type === 'phone') return it.phone || '';
    if (it.type === 'vcard') return it.vcardName || '';
    if (it.type === 'text') return (it.text || '').slice(0, 40);
    return '';
  }

  // grid actions (delegated)
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.icon-btn[data-act]');
    if (!btn) return;
    const card = btn.closest('.qr-card');
    if (!card) return;
    const id = card.dataset.id;
    const it = state.items.find(x => x.id === id);
    if (!it) return;
    const act = btn.dataset.act;
    if (act === 'view') openViewModal(it);
    else if (act === 'edit') openEditModal(it);
    else if (act === 'copy') {
      try { await navigator.clipboard.writeText(qrText(it)); toast('Copied to clipboard'); }
      catch { toast('Copy failed', 'error'); }
    }
    else if (act === 'png') {
      const c = document.createElement('canvas');
      await drawWithStyle(c, qrText(it), { width: 1024, fg: it.fg || '#000', bg: it.bg || '#fff', style: it.style || 'square', logo: it.logo });
      const a = document.createElement('a');
      a.href = c.toDataURL('image/png');
      a.download = (it.label || 'qr').replace(/[^a-z0-9-]+/gi, '_') + '.png';
      a.click();
      toast('Downloaded');
    }
    else if (act === 'del') {
      if (!confirm('Delete this QR code? Anyone scanning it will hit a dead link.')) return;
      state.items = state.items.filter(x => x.id !== id);
      persistItems();
      toast('Deleted');
      renderDashboard();
    }
  });

  /* ----- MODALS ----- */
  function openModal(html) {
    closeModal();
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.id = 'modalBg';
    bg.innerHTML = html;
    bg.addEventListener('click', (e) => { if (e.target === bg) closeModal(); });
    document.body.appendChild(bg);
    const close = bg.querySelector('.modal-close');
    if (close) close.addEventListener('click', closeModal);
  }
  function closeModal() {
    const bg = $('#modalBg');
    if (bg) bg.remove();
  }

  async function openViewModal(it) {
    openModal(`
      <div class="modal">
        <div class="modal-head">
          <h3>${esc(it.label)}</h3>
          <button class="modal-close">${ICONS.close}</button>
        </div>
        <div class="modal-body" style="text-align:center;">
          <div style="background:${it.bg || '#fff'}; padding:24px; border-radius: var(--r); margin-bottom: 16px;">
            <canvas id="viewCanvas" style="width:100%; max-width:280px;"></canvas>
          </div>
          <div class="encodes-line"><strong>Encodes:</strong> <span>${esc(qrText(it))}</span></div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" id="viewCopy">${ICONS.copy}<span>Copy</span></button>
          <button class="btn btn-primary" id="viewDl">${ICONS.download}<span>Download PNG</span></button>
        </div>
      </div>
    `);
    const c = $('#viewCanvas');
    await drawWithStyle(c, qrText(it), { width: 560, fg: it.fg || '#000', bg: it.bg || '#fff', style: it.style || 'square', logo: it.logo });
    $('#viewCopy').addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(qrText(it)); toast('Copied'); } catch { toast('Copy failed', 'error'); }
    });
    $('#viewDl').addEventListener('click', async () => {
      const cc = document.createElement('canvas');
      await drawWithStyle(cc, qrText(it), { width: 1024, fg: it.fg || '#000', bg: it.bg || '#fff', style: it.style || 'square', logo: it.logo });
      const a = document.createElement('a');
      a.href = cc.toDataURL('image/png');
      a.download = (it.label || 'qr').replace(/[^a-z0-9-]+/gi, '_') + '.png';
      a.click();
    });
  }

  function openEditModal(it) {
    const isUrl = it.type === 'url';
    openModal(`
      <div class="modal">
        <div class="modal-head">
          <h3>Edit QR Code</h3>
          <button class="modal-close">${ICONS.close}</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label class="field-label">Label</label>
            <input class="input" id="ed_label" value="${esc(it.label)}">
          </div>
          ${isUrl ? `
            <div class="field">
              <label class="field-label">Destination URL</label>
              <input class="input" id="ed_dest" value="${esc(it.destination || it.url || '')}">
              <div class="field-hint">${isDynamic()
                ? 'In dynamic mode, changing this updates the redirect — your printed QR keeps working.'
                : 'In static mode, the QR encodes this URL directly. Changing it requires regenerating the QR.'}</div>
            </div>
          ` : `
            <div class="field">
              <label class="field-label">Content</label>
              <textarea class="input textarea" id="ed_content">${esc(qrSubLine(it))}</textarea>
              <div class="field-hint">For non-URL QR codes, changing content requires regenerating the QR (it's encoded directly).</div>
            </div>
          `}
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost modal-close">Cancel</button>
          <button class="btn btn-primary" id="ed_save">Save changes</button>
        </div>
      </div>
    `);
    $('#ed_save').addEventListener('click', () => {
      it.label = ($('#ed_label').value || '').trim() || it.label;
      if (isUrl) {
        const newDest = normalizeUrl($('#ed_dest').value);
        if (!newDest) { toast('URL cannot be empty', 'error'); return; }
        it.destination = newDest;
        it.url = newDest;
      }
      persistItems();
      closeModal();
      toast(isUrl && isDynamic() ? 'Destination updated — QR unchanged' : 'Saved');
      renderDashboard();
    });
  }

  /* ----- SETTINGS VIEW ----- */
  function renderSettings() {
    viewport.innerHTML = `
      <div class="view">
        <div class="card" style="max-width:640px;">
          <div class="card-head"><h2>Dynamic mode setup</h2></div>
          <p style="color:var(--ink-3); font-size:13px; margin-bottom: 18px;">
            Optional. If you run a redirect server, paste its base URL here. URL-type QR codes
            will then encode <code>your-server/r/{slug}</code> instead of the destination directly,
            making them editable post-print.
          </p>
          <div class="field">
            <label class="field-label">Redirect server URL</label>
            <input class="input mono" id="set_prefix" placeholder="https://qr.example.com/r" value="${esc(state.settings.prefix || '')}">
            <div class="field-hint">Leave empty for static mode (QR encodes destination URL directly).</div>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-primary" id="set_save">Save</button>
            <button class="btn btn-ghost" id="set_clear">Use static mode</button>
          </div>
        </div>

        <div class="card" style="max-width:640px;">
          <div class="card-head"><h2>Manage data</h2></div>
          <p style="color:var(--ink-3); font-size:13px; margin-bottom: 14px;">
            All QR codes are stored in your browser's local storage.
          </p>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-ghost" id="set_export">Export as JSON</button>
            <button class="btn btn-danger" id="set_reset">Delete all data</button>
          </div>
        </div>
      </div>
    `;
    $('#set_save').addEventListener('click', () => {
      const v = ($('#set_prefix').value || '').trim();
      if (v && !/^https?:\/\//i.test(v)) { toast('URL must start with http(s)://', 'error'); return; }
      state.settings.prefix = v;
      persistSettings();
      updateModeIndicator();
      toast(v ? 'Dynamic mode enabled' : 'Static mode enabled');
    });
    $('#set_clear').addEventListener('click', () => {
      $('#set_prefix').value = '';
      state.settings.prefix = '';
      persistSettings();
      updateModeIndicator();
      toast('Static mode enabled');
    });
    $('#set_export').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify({ items: state.items, settings: state.settings }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'qrforge-export-' + Date.now() + '.json';
      a.click();
      toast('Exported');
    });
    $('#set_reset').addEventListener('click', () => {
      if (!confirm('Delete all QR codes and settings? This cannot be undone.')) return;
      state.items = []; state.settings = { prefix: '', adminToken: '' };
      persistItems(); persistSettings();
      toast('Cleared');
      setView('create');
    });
  }

  /* ========= INIT ========= */
  loadAll();
  $$('.nav-item').forEach(b => {
    if (b.dataset.view) b.addEventListener('click', () => setView(b.dataset.view));
  });
  setView('create');
})();
</script>
</body>
</html>
